name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'job-tracker/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/deploy-tracker.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-meeting-bot:
    runs-on: ubuntu-latest
    if: false  # disabled for now, manual trigger only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: '/coding/meeting-summary-bot/'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  build-tracker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        working-directory: job-tracker

      - name: Install dependencies
        run: npm ci
        working-directory: job-tracker

      - name: Build
        run: npm run build
        working-directory: job-tracker

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: job-tracker/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-tracker
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
